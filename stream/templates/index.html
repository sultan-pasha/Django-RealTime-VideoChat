<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCamera</title>
    <style>
        #video-container{
            display: flex;
            gap:5%;
        }
    </style>
</head>
<body>
    <h3 id='label-username'> USERNAME </h3>

    <div>
        <input id='username'><button id="btn-join">join Room</button>
    </div>
    <div class="main-grid-container">
        <div id="video-container">
            <div><video muted autoplay playsinline src="" id="local-video"></video></div>
        </div>
    </div>
    <script>
        var mapPeers={};
        var usernameInput = document.querySelector('#username');
        var btnJoin = document.querySelector("#btn-join");
        var username;
        var ws;



        btnJoin.addEventListener('click', ()=>{
            username = usernameInput.value;
            console.log(username)
            if (username == ''){
                return;
            }
            usernameInput.value = '';
            usernameInput.disabled = true;
            usernameInput.style.visibility = 'hidden';
            btnJoin.disabled = true;
            btnJoin.style.visibility = 'hidden';
            var labelUsername = document.querySelector("#label-username");
            labelUsername.innerHTML = username;
            
            
            const url = `ws:${window.location.host}/ws/live/`
            //const url = `wss:${window.location.host}/ws/live/`
            ws = new WebSocket(url);
            ws.onopen = (event) => {
                console.log("connected websoket")
                sendSignal('new-peer', {})
            }

            ws.onmessage = (event) => {
                var parsedData = JSON.parse(event.data)
                console.log(parsedData)
                var peerUsername = parsedData['peer']
                var action = parsedData['action']
                if(username == peerUsername){
                    return;
                }
                var reciver_channel_name = parsedData['message']['reciever_channel_name'];

                if(action == 'new-peer'){
                    createOfferer(peerUsername, reciver_channel_name);
                    return;
                }

                if(action == 'new-offer'){
                    var offer = parsedData['message']['sdp'];
                    createAnswer(offer, peerUsername, reciver_channel_name);
                }

                if(action == 'new-answer'){
                    var answer = parsedData['message']['sdp'];
                    var peer = mapPeers[peerUsername][0];
                    peer.setRemoteDescription(answer)
                    return;
                }
            }

            ws.onclose = (event) => {
                console.log('connection closed')
            }

            ws.onerror = (event) => {
                console.log('connected has an error')
            }

        })




        

    var localstream = new MediaStream()
    const constreaints = {
        "video": {
            width: { min: 640, ideal: 1920 },
            height: { min: 400, ideal: 1080 },
            aspectRatio: { ideal: 1.7777777778 },
        },
        'audio': true
    }
    const localVideo = document.getElementById("local-video");
    var usermedia = navigator.mediaDevices.getUserMedia(constreaints)
        .then(stream =>{
            localstream = stream;
            localVideo.srcObject = localstream;
        })
        .catch(err => {
            console.log('stream has an error ', err);
        })

        function sendSignal(action, message){
            var jsonStr = JSON.stringify({
                'peer': username,
                'action': action,
                'message' :message
            })
            ws.send(jsonStr)
        }

        function createOfferer(peerUsername, reciever_channel_name){
            var ice = {"iceServers": [
                {"urls": "stun:stun.l.google.com:19302"}, 
                {"urls": "turn:turnserver.com", "username": "user", "credential": "pass"} 
                ]};
            var peer = new RTCPeerConnection(ice)
            addLocalTracks(peer);

            var dc = peer.createDataChannel('channel');
            dc.addEventListener('open', ()=>{
                console.log('connecting opend!')
            })
            var remoteVideo = createVideo(peerUsername);
            setONTrack(peer, remoteVideo);
            mapPeers[peerUsername] = [peer, dc];

            peer.addEventListener('iceconnectionstatechange', ()=>{
                var iceConnectionState = peer.iceConnectionState;
                if(iceConnectionState === 'failed' || iceConnectionState === 'disconnected' || iceConnectionState === 'closed'){
                    delete mapPeers[peerUsername];
                    if(iceConnectionState != 'closed'){
                        peer.close();
                    }
                    removeVideo(remoteVideo);
                }
            });

            peer.addEventListener('icecandidate', (event)=>{
                if(event.candidate){
                    console.log("sultan peer", peer)
                    console.log("sultan event candidate", event)
                    console.log('New ice candidate', JSON.stringify(peer.localDescription))
                    return;
                }
                sendSignal('new-offer', {
                    'sdp': peer.localDescription,
                    'reciever_channel_name': reciever_channel_name
                })
            });

            peer.createOffer()
                .then(o => peer.setLocalDescription(o))
                .then(()=>{
                    console.log('local description set successfully. ')
                })
        }
        function createAnswer(offer, peerUsername,  reciever_channel_name){
            var ice = {"iceServers": [
                {"urls": "stun:stun.l.google.com:19302"}, 
                {"urls": "turn:turnserver.com", "username": "user", "credential": "pass"} 
                ]};

            var peer = new RTCPeerConnection(ice)
            addLocalTracks(peer);
            var remoteVideo = createVideo(peerUsername);
            setONTrack(peer, remoteVideo);
            peer.addEventListener('datachannel', e=>{
                peer.dc = e.channel;
                peer.dc.addEventListener('open', ()=>{
                    console.log('connecting opend!')
                })
                peer.dc.addEventListener('message', dcOnMessage)
                mapPeers[peerUsername] = [peer, peer.dc];
            });


            peer.addEventListener('iceconnectionstatechange', ()=>{
                var iceConnectionState = peer.iceConnectionState;
                if(iceConnectionState === 'failed' || iceConnectionState === 'disconnected' || iceConnectionState === 'closed'){
                    delete mapPeers[peerUsername];
                    if(iceConnectionState != 'closed'){
                        peer.close();
                    }
                    removeVideo(remoteVideo);
                }
            });

            peer.addEventListener('icecandidate', (event)=>{
                if(event.candidate){
                    console.log('New ice candidate', JSON.stringify(peer.localDescription))
                    return;
                }
                sendSignal('new-answer', {
                    'sdp': peer.localDescription,
                    'reciever_channel_name': reciever_channel_name
                })
            });

            peer.setRemoteDescription(offer)
                .then(()=>{
                    console.log('remote description set successfully for %s.', peerUsername);
                    return peer.createAnswer();
                })
                .then(a => {
                    console.log('answer created!');
                    peer.setLocalDescription(a);
                })
        }
        function addLocalTracks(peer){
            localstream.getTracks().forEach(track =>{
                peer.addTrack(track, localstream);
            });
            
            return;
        }

        function createVideo(peerUsername){
            console.log('video creating...')
            var videoContainer = document.querySelector("#video-container");
            var remoteVideo = document.createElement('video');
            remoteVideo.id = peerUsername + '-video'
            remoteVideo.autoplay = true;
            remoteVideo.playsInline = true;
            var videoWrapper = document.createElement('div');
            videoContainer.appendChild(videoWrapper);
            videoWrapper.appendChild(remoteVideo);
            
            console.log('video created...', remoteVideo, videoWrapper)
            return remoteVideo;
        }
        function setONTrack(peer, remoteVideo){
            var remoteStream = new MediaStream();
            console.log("stream here", remoteStream)
            remoteVideo.srcObject = remoteStream;
            peer.addEventListener('track', async (event)=>{
                remoteStream.addTrack(event.track, remoteStream);
            })
        }
        
        function removeVideo(video){
            var videoWrapper = video.parentNode;
            videoWrapper.parentNode.removeChild(videoWrapper);
        }
    </script>
</body>
</html>
